name: Build Unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-unsigned-ipa:
    name: Build unsigned iOS app
    runs-on: macos-15

    env:
      PROJECT_PATH: GoKartARLine.xcodeproj
      SCHEME: GoKartARLine
      CONFIGURATION: Release
      BUILD_PRODUCTS_DIR: build/Products
      ARTIFACT_DIR: build/artifacts
      IPA_NAME: GoKartARLine-unsigned.ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Show Xcode version
        run: |
          xcodebuild -version
          xcodebuild -showsdks

      - name: Build app without signing
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          xcodebuild \
            -project "$PROJECT_PATH" \
            -target "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            SYMROOT="$BUILD_PRODUCTS_DIR" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            clean build 2>&1 | tee "$ARTIFACT_DIR/xcodebuild.log"

      - name: Package unsigned IPA
        run: |
          set -euo pipefail
          APP_PATH="$BUILD_PRODUCTS_DIR/$CONFIGURATION-iphoneos/$SCHEME.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "App bundle not found: $APP_PATH"
            find "$BUILD_PRODUCTS_DIR" -maxdepth 3 -type d -name "*.app" -print
            exit 1
          fi

          rm -rf "$ARTIFACT_DIR/Payload"
          mkdir -p "$ARTIFACT_DIR/Payload"
          cp -R "$APP_PATH" "$ARTIFACT_DIR/Payload/"
          (cd "$ARTIFACT_DIR" && zip -qry "$IPA_NAME" Payload)
          ls -lh "$ARTIFACT_DIR/$IPA_NAME"

      - name: Upload xcodebuild log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: xcodebuild-log
          path: ${{ env.ARTIFACT_DIR }}/xcodebuild.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v7
        with:
          name: GoKartARLine-unsigned-ipa
          path: ${{ env.ARTIFACT_DIR }}/${{ env.IPA_NAME }}
          if-no-files-found: error
          retention-days: 14


